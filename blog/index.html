<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>j0yb0y ~ blog</title>
  <link rel="icon" type="image/png" href="../ppic.png">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="reading-progress" aria-hidden="true"></div>
  <div id="matrix-canvas"></div>

  <nav role="navigation" aria-label="Main navigation">
    <div class="nav-container">
      <span class="nav-prompt">j0yb0y@site:~/blog$</span>
      <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">[=]</button>
      <ul class="nav-links">
        <li><a href="../index.html">~/home</a></li>
        <li><a href="../index.html#projects">~/projects</a></li>
        <li><a href="../index.html#skills">~/skills</a></li>
        <li><a href="index.html">~/blog</a></li>
        <li><a href="../index.html#contact">~/contact</a></li>
      </ul>
    </div>
  </nav>

  <div id="mobile-menu-overlay" class="mobile-menu-overlay" aria-hidden="true">
    <nav class="mobile-nav">
      <a href="../index.html">~/home</a>
      <a href="../index.html#projects">~/projects</a>
      <a href="../index.html#skills">~/skills</a>
      <a href="index.html">~/blog</a>
      <a href="../index.html#contact">~/contact</a>
    </nav>
  </div>

  <main role="main">
    <section id="blog">
      <h2 class="section-title"><span class="prompt">#</span> ~/blog</h2>
      <div class="divider">--- ls -la /posts/</div>

      <div class="blog-search-container">
        <span class="prompt">$</span>
        <span class="blog-search-label">grep -i "</span>
        <input type="text" id="blog-search" class="blog-search-input" placeholder="search posts..." aria-label="Search blog posts">
        <span class="blog-search-label">"</span>
      </div>

      <div id="blog-grid" class="blog-list" aria-live="polite"></div>

      <p class="section-footer"><a href="../index.html">~ back to home</a></p>
    </section>
  </main>

  <footer role="contentinfo">
    <div class="footer-container">
      <p class="footer-prompt">j0yb0y@site:~/blog$ <span class="blink">_</span></p>
      <p class="footer-copy">&copy; 2026 j0yb0y &mdash; Built with &lt;/&gt; on Kali Linux</p>
    </div>
  </footer>

  <button id="back-to-top" class="back-to-top" aria-label="Back to top">[^ top]</button>

  <script src="../github.js"></script>
  <script src="../blog.js"></script>
  <script src="../ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      UI.initProgressBar();
      UI.initMobileMenu();
      UI.initBackToTop();
      UI.initScrollReveal();

      const grid = document.getElementById('blog-grid');
      const searchInput = document.getElementById('blog-search');

      try {
        await Blog.loadPosts(grid, 0);
        if (searchInput) Blog.initSearch(searchInput, grid);
      } catch {
        grid.innerHTML = '<p class="section-footer">Failed to load blog posts.</p>';
      }

      UI.initCommandPalette();
    });
  </script>
</body>
</html>
